name: Claude Code Review (Fresh Eyes)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  claude-review:
    name: Claude Fresh-Eyes Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Loop-breaker: skip automated review if last commit was by the implement bot ──
      - name: Check if triggered by claude-implement-bot
        id: bot_check
        run: |
          LAST_AUTHOR=$(git log -1 --format='%an')
          LAST_MSG=$(git log -1 --format='%s')
          echo "Last commit author : $LAST_AUTHOR"
          echo "Last commit message: $LAST_MSG"
          if [ "$LAST_AUTHOR" = "claude-implement-bot" ]; then
            echo "is_bot_commit=true"  >> $GITHUB_OUTPUT
          else
            echo "is_bot_commit=false" >> $GITHUB_OUTPUT
          fi

      # ── If bot commit: skip Claude review, just flag for human attention ──
      - name: Notify PR — awaiting human review after auto-implement
        if: steps.bot_check.outputs.is_bot_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## 👤 Human Review Required

          Claude has automatically implemented the review suggestions and committed the changes to this branch.

          **Automated review is skipped for bot commits** to prevent an infinite review → implement loop.

          ### What to do next
          - [ ] Review the changes Claude committed (see latest commit in this PR)
          - [ ] Run tests locally if needed: \`pytest tests/ -v\`
          - [ ] Approve and merge, or request further changes manually

          ---
          *Loop-breaker: \`claude-review\` detected commit by \`claude-implement-bot\` and skipped re-review.*"

      - name: Generate PR diff
        if: steps.bot_check.outputs.is_bot_commit != 'true'
        run: |
          git diff origin/main...HEAD > pr_diff.txt
          echo "Diff lines: $(wc -l < pr_diff.txt)"
          echo "Diff chars: $(wc -c < pr_diff.txt)"

      - name: Run Claude Fresh-Eyes Review
        if: steps.bot_check.outputs.is_bot_commit != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DESCRIPTION: ${{ github.event.pull_request.body }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          # Read diff — cap at 15000 chars to stay within token limits
          with open("pr_diff.txt", "r") as f:
              diff = f.read(15000)

          truncated = len(diff) >= 15000

          pr_title = os.environ.get("PR_TITLE", "N/A")
          pr_desc  = os.environ.get("PR_DESCRIPTION", "N/A")

          user_prompt = f"""You are reviewing a pull request. You have NO prior knowledge of this project or the developer who wrote it.
          You are seeing ONLY the following PR metadata and the diff of the changes.
          Review it as a senior engineer would on their first look.

          **PR Title:** {pr_title}
          **PR Description:**
          {pr_desc}

          **Code Diff:**
          ```diff
          {diff}
          ```
          {"⚠️ Diff was truncated at 15,000 characters." if truncated else ""}

          Provide your review in this structure:
          ### ✅ Strengths
          - List what is done well

          ### 🐛 Potential Bugs / Correctness Issues
          - List any logic errors, edge cases, or bugs

          ### 🔒 Security Concerns
          - List any security issues (hardcoded secrets, injection risks, etc.)

          ### ⚡ Performance & Efficiency
          - List any performance concerns

          ### 📖 Readability & Best Practices
          - List naming, structure, or style issues

          ### 💡 Suggestions
          - Concrete improvements with examples if possible

          ### 📋 Overall Verdict
          One of: **Approve** | **Request Changes** | **Comment Only**
          And a 1-2 sentence summary.
          """

          payload = {
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1500,
              "system": (
                  "You are a senior software engineer doing a code review. "
                  "You have zero prior context about this codebase, project, or developer. "
                  "You only know what is in the PR diff and its title/description. "
                  "Be concise, specific, constructive, and unbiased. "
                  "If the diff is small or trivial, say so clearly."
              ),
              "messages": [{"role": "user", "content": user_prompt}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          review_text = result["content"][0]["text"]

          with open("review_output.txt", "w") as f:
              f.write(review_text)

          print(review_text)
          PYEOF

      - name: Post review comment on PR
        if: steps.bot_check.outputs.is_bot_commit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat review_output.txt)
          gh pr comment ${{ github.event.pull_request.number }} --body "## 🤖 Claude Code Review — Fresh Eyes

          > **No prior context was provided to this agent.** It reviewed only the PR diff, title, and description — not the coding session, chat history, or codebase.

          ---

          ${REVIEW}

          ---
          *Powered by Claude \`claude-haiku-4-5-20251001\` via GitHub Actions · [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
